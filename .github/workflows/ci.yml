name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout monero-kit-android
        uses: actions/checkout@v4
        with:
          repository: bwgh0/monero-kit-android
          path: monero-kit-android

      - name: Fix MoneroKit path for CI
        run: |
          sed -i 's|\.\./monero-kit-android|monero-kit-android|g' settings.gradle.kts

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
