name: Deploy to Google Play

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout monero-kit-android
        uses: actions/checkout@v4
        with:
          repository: bwgh0/monero-kit-android
          path: monero-kit-android

      - name: Fix MoneroKit path for CI
        run: |
          sed -i 's|\.\./monero-kit-android|monero-kit-android|g' settings.gradle.kts

      - name: Set version from tag
        run: |
          TAG="${GITHUB_REF_NAME}"           # v1.0.3-4
          VERSION="${TAG%-*}"                 # v1.0.3
          VERSION="${VERSION#v}"              # 1.0.3
          BUILD="${TAG##*-}"                  # 4

          echo "Version: $VERSION  Build: $BUILD"

          sed -i "s/versionCode = [0-9]*/versionCode = $BUILD/" app/build.gradle.kts
          sed -i "s/versionName = \"[0-9.]*\"/versionName = \"$VERSION\"/" app/build.gradle.kts

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "BUILD=$BUILD" >> "$GITHUB_ENV"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > upload-keystore.jks

      - name: Create keystore.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat > keystore.properties << EOF
          storeFile=../upload-keystore.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Build release AAB
        run: ./gradlew bundleRelease --no-daemon

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Generate SHA-256 hash
        run: |
          cd app/build/outputs/apk/release
          sha256sum *.apk > SHA256SUMS.txt
          echo "SHA-256 hash:"
          cat SHA256SUMS.txt

      - name: Attest APK provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: app/build/outputs/apk/release/*.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/release/SHA256SUMS.txt
          generate_release_notes: true

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: one.monero.moneroone
          releaseFiles: app/build/outputs/bundle/release/*.aab
          track: internal
          status: completed
          changesNotSentForReview: true

      - name: Upload build artifacts on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs
          path: app/build/reports/
          if-no-files-found: ignore
